version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: esportivabet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: esportivabet
      POSTGRES_PASSWORD: esportivabet
      POSTGRES_DB: esportivabet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esportivabet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: esportivabet-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://esportivabet:esportivabet@postgres:5432/esportivabet?schema=public
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-too-in-production
      ACCESS_PASSWORD: Espo1306
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      SUPABASE_URL: ""
      SUPABASE_SERVICE_KEY: ""
      SUPABASE_BUCKET: uploads
    ports:
      - "3001:3001"
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: esportivabet-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  pgdata:
